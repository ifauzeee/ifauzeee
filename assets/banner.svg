<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" font-family="'JetBrains Mono', 'Courier New', monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d1117"/>
      <stop offset="1" stop-color="#161b22"/>
    </linearGradient>
    <linearGradient id="orange" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ff5c00"/>
      <stop offset="1" stop-color="#ff9d5c"/>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 L0 0 0 40" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>

  <!-- terminal prompt -->
  <text x="80" y="120" fill="#8b949e" font-size="22">~/ifauze $</text>
  <text x="230" y="120" fill="#ff5c00" font-size="22">whoami --verbose</text>

  <!-- name -->
  <text x="80" y="190" fill="#f0f6fc" font-size="62" font-weight="700" letter-spacing="2">MUHAMMAD IBNU FAUZI</text>

  <!-- orange underline -->
  <rect x="84" y="210" width="320" height="6" rx="3" fill="url(#orange)"/>

  <!-- role -->
  <text x="84" y="258" fill="#c9d1d9" font-size="26">Creative Developer &amp; Systems Architect</text>

  <!-- blinking cursor -->
  <rect x="560" y="172" width="14" height="34" fill="#ff5c00">
    <animate attributeName="opacity" values="1;1;0;0" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- bottom wave -->
  <path d="M0 300 C 200 270, 400 330, 600 300 S 1000 270, 1200 300 L1200 320 L0 320 Z" fill="url(#orange)" fill-opacity="0.9"/>
  <path d="M0 312 C 220 290, 420 334, 640 308 S 1020 290, 1200 312" fill="none" stroke="#ff5c00" stroke-width="2" stroke-opacity="0.5"/>
</svg>
